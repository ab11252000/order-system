<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 — 翔躍企業社</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:      #C6A96B;
  --gold-dark: #B8965A;
  --gold-dim:  rgba(198,169,107,.08);
  --text:      #111827;
  --text-2:    #6B7280;
  --text-3:    #9CA3AF;
  --border:    #E5E7EB;
  --bg:        #F8FAFC;
  --card:      #FFFFFF;
  --red:       #EF4444;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Noto Sans TC', sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  -webkit-font-smoothing:antialiased;
  position:relative;
}

body::before {
  content:'';
  position:fixed; inset:0; pointer-events:none;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:52px 52px;
  opacity:.28;
}

.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:52px 44px;
  width:400px; max-width:calc(100vw - 36px);
  text-align:center;
  box-shadow:0 1px 2px rgba(0,0,0,.04), 0 8px 40px rgba(0,0,0,.07);
  position:relative; z-index:1;
  animation:rise .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes rise {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.logo-mark {
  width:60px; height:60px; border-radius:16px;
  background:var(--gold); margin:0 auto 24px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(198,169,107,.30);
}
.logo-mark svg { width:30px; height:30px; }

.brand-label {
  font-size:10px; font-weight:700; letter-spacing:3px;
  text-transform:uppercase; color:var(--text-3); margin-bottom:8px;
}
h1 {
  font-size:24px; font-weight:900; color:var(--text);
  letter-spacing:-.3px; margin-bottom:8px;
}
.sub {
  font-size:13px; color:var(--text-3); line-height:1.8; margin-bottom:36px;
}

.line-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; background:var(--gold); color:white;
  border:none; border-radius:10px; padding:14px 20px;
  font-size:14px; font-weight:700; font-family:inherit;
  cursor:pointer; letter-spacing:.3px;
  box-shadow:0 2px 12px rgba(198,169,107,.30);
  transition:background .18s, box-shadow .18s, transform .12s;
}
.line-btn:hover {
  background:var(--gold-dark);
  box-shadow:0 4px 22px rgba(198,169,107,.40);
  transform:translateY(-1px);
}
.line-btn:active { transform:translateY(0); }

.line-icon {
  width:28px; height:28px; border-radius:7px;
  background:rgba(255,255,255,.22);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.line-icon svg { width:18px; height:18px; }

.sep {
  display:flex; align-items:center; gap:12px;
  margin:22px 0 16px;
  font-size:10px; font-weight:600; color:var(--text-3); letter-spacing:1.5px; text-transform:uppercase;
}
.sep::before, .sep::after { content:''; flex:1; height:1px; background:var(--border); }

.notice { font-size:11.5px; color:var(--text-3); line-height:1.9; }

@media (max-width:480px) {
  .card { padding:40px 24px; }
  h1 { font-size:20px; }
}

#overlay {
  display:none; position:fixed; inset:0;
  background:rgba(248,250,252,.94); z-index:99;
  flex-direction:column; align-items:center; justify-content:center; gap:14px;
}
#overlay.on { display:flex; }
.spinner {
  width:36px; height:36px;
  border:2px solid var(--border);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#overlay p { font-size:13px; color:var(--text-2); font-weight:500; }
</style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <p id="overlayMsg">初始化中…</p>
</div>

<div class="card">
  <div class="logo-mark">
    <svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="6" width="20" height="14" rx="3.5" fill="white" fill-opacity=".9"/>
      <circle cx="8"  cy="13" r="1.8" fill="white" fill-opacity=".45"/>
      <circle cx="14" cy="13" r="1.8" fill="white"/>
      <circle cx="20" cy="13" r="1.8" fill="white" fill-opacity=".45"/>
      <path d="M11 20 L14 26 L17 20" fill="white" fill-opacity=".85"/>
    </svg>
  </div>

  <div class="brand-label">翔躍企業社</div>
  <h1>下單系統</h1>
  <p class="sub">使用 LINE 帳號快速登入<br>安全可靠的批發訂貨平台</p>

  <button class="line-btn" onclick="handleLineLogin()">
    <div class="line-icon">
      <svg viewBox="0 0 24 24" fill="white">
        <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
      </svg>
    </div>
    使用 LINE 帳號登入
  </button>

  <div class="sep">安全保障</div>
  <p class="notice">本系統採用 LINE 官方 OAuth 2.0 認證<br>您的個人資料受到完整保護</p>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const LIFF_ID = localStorage.getItem('xy_liffId') || '2009824470-aKS2WXeU';

function sessionValid() {
  return localStorage.getItem('isLoggedIn') === 'true';
}

function setOverlay(msg) {
  document.getElementById('overlayMsg').textContent = msg;
  document.getElementById('overlay').classList.add('on');
}

async function saveAndRedirect(profile) {
  const user = {
    id:     profile.userId,
    name:   profile.displayName,
    avatar: profile.displayName.charAt(0),
    lineId: profile.userId,
  };
  localStorage.setItem('currentUser', JSON.stringify(user));
  localStorage.setItem('isLoggedIn',  'true');
  window.location.href = '下單.html';
}

async function initLiff() {
  if (!LIFF_ID) { showError('尚未設定 LIFF ID，請聯絡管理員。'); return; }

  // 已有有效 session → 直接進入，不啟動 LIFF
  if (sessionValid()) {
    window.location.href = '下單.html';
    return;
  }

  // 尚未登入 → 清除舊資料
  localStorage.removeItem('isLoggedIn');
  localStorage.removeItem('currentUser');

  try {
    setOverlay('初始化中…');
    await liff.init({ liffId: LIFF_ID });

    if (liff.isLoggedIn()) {
      // 已在 LINE App 內授權，直接取 profile
      setOverlay('LINE 登入驗證中，請稍候…');
      const profile = await liff.getProfile();
      await saveAndRedirect(profile);
    } else if (liff.isInClient()) {
      // 在 LINE App 內開啟但尚未授權 → 靜默觸發授權，不需按按鈕
      liff.login();
    } else {
      // 外部瀏覽器 → 顯示登入按鈕讓用戶點擊（點後會跳轉 LINE App）
      document.getElementById('overlay').classList.remove('on');
    }
  } catch(e) {
    document.getElementById('overlay').classList.remove('on');
    showError('初始化失敗：' + e.message);
  }
}

function handleLineLogin() {
  if (!LIFF_ID) { showError('尚未設定 LIFF ID，請聯絡管理員。'); return; }
  setOverlay('前往 LINE 授權中…');
  liff.login();
}

function showError(msg) {
  const el = document.createElement('p');
  el.style.cssText = 'color:#EF4444;font-size:12px;margin-top:16px;font-weight:600;';
  el.textContent = msg;
  document.querySelector('.card').appendChild(el);
}

initLiff();
</script>
</body>
</html>
