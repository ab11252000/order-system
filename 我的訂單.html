<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的訂單 — 翔躍企業社</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root {
  --gold:        #C6A96B;
  --gold-dark:   #B8965A;
  --gold-dim:    rgba(198,169,107,.08);
  --gold-border: rgba(198,169,107,.28);
  --text:        #111827;
  --text-2:      #6B7280;
  --text-3:      #9CA3AF;
  --border:      #E5E7EB;
  --border-soft: #F3F4F6;
  --bg:          #F8FAFC;
  --card:        #FFFFFF;
  --green:       #22C55E;
  --green-dark:  #16A34A;
  --green-dim:   rgba(34,197,94,.10);
  --red:         #EF4444;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:'Noto Sans TC', sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; -webkit-font-smoothing:antialiased;
}

/* ── Nav ── */
.nav {
  background:var(--card); border-bottom:1px solid var(--border);
  height:54px; display:flex; align-items:center; padding:0 28px;
  position:sticky; top:0; z-index:100;
}
.nav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; flex-shrink:0; }
.nav-brand-mark { width:7px; height:7px; border-radius:50%; background:var(--gold); }
.nav-brand-text { font-size:14px; font-weight:800; color:var(--text); letter-spacing:.5px; }
.nav-links { display:flex; align-items:center; flex:1; justify-content:center; }
.nav-link {
  padding:6px 16px; font-size:13px; font-weight:500;
  text-decoration:none; color:var(--text-3); transition:color .15s;
}
.nav-link:hover { color:var(--text-2); }
.nav-link.active { color:var(--gold); font-weight:700; }
.nav-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.user-pill {
  display:flex; align-items:center; gap:8px;
  padding:4px 12px 4px 5px; border-radius:100px; border:1px solid var(--border);
}
.user-avatar {
  width:24px; height:24px; border-radius:50%;
  border:1.5px solid var(--gold-border); background:var(--gold-dim);
  font-size:10px; font-weight:800; color:var(--gold);
  display:flex; align-items:center; justify-content:center;
}
.user-name { font-size:12px; font-weight:600; color:var(--text-2); }
.btn-logout {
  padding:5px 12px; border-radius:7px; border:1px solid var(--border);
  background:transparent; color:var(--text-3); font-size:12px; font-weight:500;
  font-family:inherit; cursor:pointer; transition:all .15s;
}
.btn-logout:hover { color:var(--red); border-color:#FECACA; background:#FFF5F5; }

/* ── Layout ── */
.main {
  max-width:600px; margin:0 auto; padding:48px 20px 80px;
  animation:fadeIn .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.page-eyebrow {
  font-size:10.5px; font-weight:700; letter-spacing:2.5px;
  text-transform:uppercase; color:var(--text-3); margin-bottom:6px;
}
.page-header-row {
  display:flex; align-items:flex-end; justify-content:space-between;
  gap:16px; flex-wrap:wrap; margin-bottom:28px;
}
.page-title { font-size:30px; font-weight:900; letter-spacing:-.5px; color:var(--text); }

/* ── Stats ── */
.stats-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.stat-chip {
  background:var(--card); border:1px solid var(--border);
  border-radius:8px; padding:7px 14px;
  font-size:12px; color:var(--text-2);
  display:flex; align-items:center; gap:5px;
}
.stat-chip strong { color:var(--text); font-size:14px; font-weight:800; }

/* ── Filter ── */
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; }
.filter-btn {
  padding:5px 14px; border-radius:100px;
  border:1px solid var(--border); background:transparent;
  font-size:12px; font-weight:600; color:var(--text-3);
  cursor:pointer; transition:all .15s; font-family:inherit;
}
.filter-btn:hover { color:var(--text-2); border-color:var(--text-3); }
.filter-btn.on { color:var(--gold); border-color:var(--gold-border); background:var(--gold-dim); }

/* ── Order list ── */
.order-list { display:flex; flex-direction:column; gap:10px; margin-top:20px; }

.order-card {
  background:var(--card); border-radius:12px; padding:20px 22px;
  border:1px solid var(--border);
  box-shadow:0 1px 2px rgba(0,0,0,.04);
  display:grid; grid-template-columns:1fr auto; gap:14px; align-items:start;
  transition:border-color .2s, box-shadow .2s;
}
.order-card:hover {
  border-color:var(--gold-border);
  box-shadow:0 2px 12px rgba(198,169,107,.08);
}
.order-id { font-size:10px; font-weight:700; letter-spacing:2px; color:var(--text-3); margin-bottom:5px; }
.order-store { font-size:16px; font-weight:800; color:var(--text); margin-bottom:4px; }
.order-content { font-size:13.5px; color:var(--text-2); line-height:1.7; white-space:pre-wrap; margin-bottom:10px; }
.order-meta { display:flex; gap:14px; flex-wrap:wrap; }
.meta-item { font-size:11.5px; color:var(--text-3); }
.order-note {
  margin-top:8px; background:var(--border-soft); border-radius:6px;
  padding:7px 11px; font-size:12px; color:var(--text-2);
  border-left:2px solid var(--border);
}

/* ── Badges ── */
.badge {
  display:inline-flex; align-items:center;
  padding:4px 10px; border-radius:100px;
  font-size:11px; font-weight:700; white-space:nowrap; letter-spacing:.2px;
}
.badge-pending    { background:#FEF9C3; color:#A16207; }
.badge-processing { background:#DBEAFE; color:#1D4ED8; }
.badge-completed  { background:var(--green-dim); color:var(--green-dark); }
.badge-cancelled  { background:#FEE2E2; color:#B91C1C; }

/* ── Empty ── */
.empty { text-align:center; padding:64px 20px; color:var(--text-3); }
.empty-icon {
  width:48px; height:48px; border-radius:12px;
  background:var(--border-soft); margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
}
.empty-icon svg { width:22px; height:22px; color:var(--text-3); }
.empty h3 { font-size:15px; font-weight:700; color:var(--text-2); margin-bottom:5px; }
.empty p  { font-size:13px; line-height:1.7; }
.empty a  { color:var(--gold); font-weight:700; text-decoration:none; }

/* ── Bottom Nav (mobile) ── */
.bottom-nav { display:none; }

@media (max-width:640px) {
  .nav { padding:0 14px; }
  .nav-links { display:none; }
  .main { padding:28px 16px 0; padding-bottom:calc(68px + env(safe-area-inset-bottom,0px)); }
  .user-name { display:none; }
  .page-header-row { flex-direction:column; align-items:flex-start; gap:12px; margin-bottom:20px; }
  .page-title { font-size:26px; }
  .filter-bar { gap:5px; }
  .filter-btn { padding:5px 12px; font-size:11.5px; }
  .order-card { padding:16px 18px; }

  .bottom-nav {
    display:flex; position:fixed; bottom:0; left:0; right:0;
    background:var(--card); border-top:1px solid var(--border);
    z-index:100; padding-bottom:env(safe-area-inset-bottom,0px);
  }
  .bottom-nav-link {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:10px 0; gap:2px;
    text-decoration:none; color:var(--text-3);
    font-size:11px; font-weight:600; letter-spacing:.2px;
    transition:color .15s;
  }
  .bottom-nav-link:hover { color:var(--text-2); }
  .bottom-nav-link.active { color:var(--gold); }
  .bottom-nav-dot {
    width:4px; height:4px; border-radius:50%;
    background:currentColor; opacity:0;
    transition:opacity .15s;
  }
  .bottom-nav-link.active .bottom-nav-dot { opacity:1; }
}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="下單.html">
    <div class="nav-brand-mark"></div>
    <span class="nav-brand-text">翔躍企業社</span>
  </a>
  <div class="nav-links">
    <a href="下單.html"     class="nav-link">訂叫貨</a>
    <a href="我的訂單.html" class="nav-link active">我的訂單</a>
    <a href="我的店面.html"  class="nav-link">我的店面</a>
  </div>
  <div class="nav-right">
    <div class="user-pill">
      <div class="user-avatar"><span id="userAvatar"></span></div>
      <span class="user-name" id="userName"></span>
    </div>
    <button class="btn-logout" onclick="logout()">登出</button>
  </div>
</nav>

<main class="main">

  <div class="page-eyebrow">翔躍企業社</div>
  <div class="page-header-row">
    <div class="page-title">我的訂單</div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn on" data-status="all"        onclick="setFilter('all')">全部</button>
      <button class="filter-btn"    data-status="pending"    onclick="setFilter('pending')">待處理</button>
      <button class="filter-btn"    data-status="processing" onclick="setFilter('processing')">處理中</button>
      <button class="filter-btn"    data-status="completed"  onclick="setFilter('completed')">已完成</button>
      <button class="filter-btn"    data-status="cancelled"  onclick="setFilter('cancelled')">已取消</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>
  <div class="order-list" id="orderList"></div>

</main>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDOl7Kq_mZZPdCPkSb_oRPBlxh37sZG5ls",
  authDomain: "xiangyue-order.firebaseapp.com",
  projectId: "xiangyue-order",
  storageBucket: "xiangyue-order.firebasestorage.app",
  messagingSenderId: "89673554795",
  appId: "1:89673554795:web:e101e39be2d99349a84a2e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
if (!user || localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'index.html';

document.getElementById('userAvatar').textContent = user.avatar;
document.getElementById('userName').textContent   = user.name;

const STATUS_MAP = {
  pending:    { label:'待處理', cls:'badge-pending' },
  processing: { label:'處理中', cls:'badge-processing' },
  completed:  { label:'已完成', cls:'badge-completed' },
  cancelled:  { label:'已取消', cls:'badge-cancelled' },
};

let currentFilter = 'all';
let myOrders = [];

db.collection('orders').onSnapshot(snap => {
  const all = [];
  snap.forEach(doc => all.push(doc.data()));
  console.log('[我的訂單] 全部訂單數:', all.length, '我的userId:', user.id);
  console.log('[我的訂單] userId列表:', all.map(o=>o.userId));
  myOrders = all.filter(o => o.userId === user.id);
  myOrders.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
  renderStats(myOrders);
  renderList();
}, err => console.error('orders error', err));

function renderStats(orders) {
  const counts = { all:orders.length };
  Object.keys(STATUS_MAP).forEach(s => counts[s] = orders.filter(o => o.status === s).length);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-chip"><strong>${counts.all}</strong> 筆訂單</div>
    <div class="stat-chip"><strong>${counts.pending}</strong> 待處理</div>
    <div class="stat-chip"><strong>${counts.processing}</strong> 處理中</div>
    <div class="stat-chip"><strong>${counts.completed}</strong> 已完成</div>
  `;
}

function renderList() {
  const filtered = currentFilter === 'all' ? myOrders : myOrders.filter(o => o.status === currentFilter);
  const list = document.getElementById('orderList');
  if (!filtered.length) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
          </svg>
        </div>
        <h3>${currentFilter === 'all' ? '還沒有訂單' : '此分類沒有訂單'}</h3>
        <p>前往 <a href="下單.html">訂貨叫貨</a> 建立第一筆訂單</p>
      </div>`;
    return;
  }
  list.innerHTML = filtered.map(o => {
    const s = STATUS_MAP[o.status] || STATUS_MAP.pending;
    const noteHtml = o.note ? `<div class="order-note">備註：${o.note}</div>` : '';
    return `
      <div class="order-card">
        <div>
          <div class="order-id"># ${o.id}</div>
          <div class="order-store">${o.storeName}</div>
          <div class="order-content">${o.content}</div>
          <div class="order-meta">
            <span class="meta-item">${o.district}</span>
            <span class="meta-item">${o.createdAt}</span>
          </div>
          ${noteHtml}
        </div>
        <span class="badge ${s.cls}">${s.label}</span>
      </div>`;
  }).join('');
}

function setFilter(status) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('on', b.dataset.status === status));
  renderList();
}

function logout() {
  if (!confirm('確定要登出嗎？')) return;
  localStorage.removeItem('isLoggedIn');
  localStorage.removeItem('currentUser');

  window.location.href = 'index.html';
}
</script>

<nav class="bottom-nav">
  <a href="下單.html"     class="bottom-nav-link"><div class="bottom-nav-dot"></div>訂貨叫貨</a>
  <a href="我的訂單.html" class="bottom-nav-link active"><div class="bottom-nav-dot"></div>我的訂單</a>
  <a href="我的店面.html"  class="bottom-nav-link"><div class="bottom-nav-dot"></div>我的店面</a>
</nav>
</body>
</html>
