<script>
(function(){
    var toggle = document.querySelector('.menu-toggle');
    var menu   = document.querySelector('.menu');
    if(!toggle || !menu) return;
    toggle.addEventListener('click', function(e){
        e.stopPropagation();
        var open = menu.classList.toggle('is-open');
        toggle.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', open);
        toggle.setAttribute('aria-label', open ? '關閉選單' : '開啟選單');
    });
    document.querySelectorAll('.menu1 > a').forEach(function(a){
        a.addEventListener('click', function(e){
            if(window.innerWidth > 768) return;
            var sub = a.parentElement.querySelector('.submenu');
            if(!sub) return;
            e.preventDefault();
            sub.classList.toggle('is-open');
        });
    });
    document.addEventListener('click', function(e){
        if(!e.target.closest('.header')){
            menu.classList.remove('is-open');
            toggle.classList.remove('is-open');
            toggle.setAttribute('aria-expanded', 'false');
            toggle.setAttribute('aria-label', '開啟選單');
            document.querySelectorAll('.submenu').forEach(function(s){ s.classList.remove('is-open'); });
        }
    });
})();

// ── 動態載入商品（雲端優先，fallback localStorage）────────────
(function(){
  var CAT = '養生館材料及設備';

  function renderProds(prods) {
    var grid = document.getElementById('sampleGrid');
    if (!grid) return;
    if (!prods || !prods.length) { grid.innerHTML = '<p style="color:#888;padding:32px 0;">尚無商品資料</p>'; return; }
    grid.innerHTML = prods.map(function(p){
      return '<div class="product-card">' +
        '<div class="product-img' + (p.img ? ' has-img' : '') + '"' + (p.img ? ' style="--product-bg:url(\'' + p.img + '\')"' : '') + '>' + (p.img ? '<img src="' + p.img + '" alt="' + p.name + '" loading="lazy">' : '') + '</div>' +
        '<div class="product-info">' +
          '<h3>' + p.name + '</h3>' +
          (p.desc ? '<p>' + p.desc + '</p>' : '') +
          '<div class="product-footer">' +
            '<div><div class="price-main">' + (p.price||'歡迎詢價') + '</div></div>' +
            '<a href="./聯絡我們.html" class="inquiry-btn">馬上購買</a>' +
          '</div>' +
        '</div></div>';
    }).join('');
  }

  try { var all = JSON.parse(localStorage.getItem('xy_products')||'{}'); renderProds(all[CAT]); } catch(e){ renderProds(null); }

  var binId = localStorage.getItem('xy_productsBinId') || '69e39183856a6821894998b0';
  var masterKey = localStorage.getItem('xy_masterKey') || '';
  if (binId) {
    var headers = {};
    if (masterKey) headers['X-Master-Key'] = masterKey;
    fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest', { headers: headers })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.record && d.record[CAT]) {
          localStorage.setItem('xy_products', JSON.stringify(d.record));
          renderProds(d.record[CAT]);
        }
      }).catch(function(){});
  }
})();
</script>
