<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理 — 翔躍企業社</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root {
  --gold:         #4F46E5;
  --gold-dark:    #4338CA;
  --gold-mid:     #6366F1;
  --gold-light:   #EEF2FF;
  --gold-border:  #C7D2FE;
  --text:         #0F172A;
  --text-2:       #334155;
  --muted:        #64748B;
  --border:       #E2E8F0;
  --bg:           #F8FAFC;
  --card:         #FFFFFF;
  --green:        #10b981;
  --green-dark:   #059669;
  --green-bg:     #ecfdf5;
  --red:          #ef4444;
  --sidebar-w:    220px;
  --topbar-h:     58px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

/* ════════════════════════════════════
   LOGIN
════════════════════════════════════ */
#loginScreen {
  position:fixed; inset:0; z-index:999;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(160deg,#0A0F1A 0%,#0E1628 60%,#141F35 100%);
}
#loginScreen::before {
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(ellipse at 60% 40%, rgba(79,70,229,.22) 0%, transparent 70%);
}
.login-card {
  position:relative;
  background:var(--card);
  border-radius:28px;
  padding:56px 48px 48px;
  width:400px;
  box-shadow:0 32px 80px rgba(0,0,0,.32), 0 0 0 1px rgba(79,70,229,.18);
  text-align:center;
}
.login-logo {
  width:76px; height:76px;
  background:linear-gradient(150deg,var(--gold-mid),var(--gold-dark));
  border-radius:22px;
  margin:0 auto 28px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 28px rgba(79,70,229,.36);
}
.login-logo svg { width:38px; height:38px; }
.lc-brand { font-size:19px; font-weight:900; color:var(--text); letter-spacing:3px; margin-bottom:3px; }
.lc-sub   { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:36px; }
.lc-input {
  width:100%; padding:14px 18px;
  border:1.5px solid var(--border);
  border-radius:13px;
  font-size:16px; font-family:inherit;
  text-align:center; letter-spacing:6px;
  outline:none; margin-bottom:14px;
  background:var(--bg);
  transition:border-color .18s, box-shadow .18s;
}
.lc-input:focus {
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(79,70,229,.10);
  background:#fff;
}
.lc-btn {
  width:100%; padding:15px;
  background:linear-gradient(150deg,var(--gold-mid),var(--gold-dark));
  color:white; border:none; border-radius:13px;
  font-size:15px; font-weight:700; font-family:inherit;
  cursor:pointer; letter-spacing:.5px;
  box-shadow:0 5px 20px rgba(79,70,229,.32);
  transition:all .2s;
}
.lc-btn:hover { filter:brightness(1.08); transform:translateY(-1px); box-shadow:0 8px 28px rgba(79,70,229,.40); }
.lc-err { font-size:13px; color:var(--red); margin-top:12px; min-height:18px; }

/* ════════════════════════════════════
   SHELL
════════════════════════════════════ */
#adminShell { display:none; height:100vh; display:none; flex-direction:column; }

/* Topbar */
.topbar {
  height:var(--topbar-h);
  background:var(--card);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center;
  padding:0 24px;
  gap:16px;
  position:fixed; top:0; left:0; right:0; z-index:100;
  box-shadow:0 1px 8px rgba(0,0,0,.06);
}
.tb-logo {
  width:36px; height:36px;
  background:linear-gradient(150deg,var(--gold-mid),var(--gold-dark));
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.tb-logo svg { width:20px; height:20px; }
.tb-brand {
  position:absolute; left:50%; transform:translateX(-50%);
  font-size:20px; font-weight:900; color:var(--text); letter-spacing:2px;
  pointer-events:none;
}
.tb-sep { flex:1; }
.tb-badge {
  background:var(--gold-light);
  border:1px solid var(--gold-border);
  color:var(--gold);
  font-size:11px; font-weight:700;
  padding:4px 12px; border-radius:100px;
  letter-spacing:.5px;
}
.tb-logout {
  padding:7px 16px; border-radius:8px;
  border:1.5px solid var(--border);
  background:transparent; color:var(--muted);
  font-size:12px; font-weight:600; font-family:inherit;
  cursor:pointer; transition:all .15s;
}
.tb-logout:hover { border-color:#fca5a5; color:var(--red); background:#fff5f5; }

/* Body layout */
.admin-body {
  display:flex;
  margin-top:var(--topbar-h);
  min-height:calc(100vh - var(--topbar-h));
}

/* ── Left Sidebar ── */
.sidebar {
  width:var(--sidebar-w);
  background:#1E293B;
  border-right:none;
  position:fixed;
  top:var(--topbar-h);
  left:0;
  bottom:0;
  overflow-y:auto;
  display:flex; flex-direction:column;
  padding:24px 0 32px;
}
.sb-section-label {
  font-size:10px; font-weight:700; color:#475569;
  letter-spacing:1.5px; text-transform:uppercase;
  padding:0 20px; margin-bottom:8px;
}
.sb-item {
  display:flex; align-items:center; gap:11px;
  padding:10px 20px;
  font-size:13px; font-weight:600; color:#94A3B8;
  border-radius:0;
  cursor:pointer;
  transition:all .15s;
  position:relative;
  text-decoration:none;
  border-left:3px solid transparent;
}
.sb-item:hover { background:rgba(255,255,255,.06); color:#CBD5E1; }
.sb-item.active {
  background:rgba(79,70,229,.18);
  color:#A5B4FC;
  border-left-color:var(--gold);
  font-weight:700;
}
.sb-icon {
  width:18px; height:18px;
  opacity:.5; flex-shrink:0;
}
.sb-item.active .sb-icon,
.sb-item:hover .sb-icon { opacity:1; }
.sb-divider { height:1px; background:rgba(255,255,255,.08); margin:12px 20px; }

/* ── Main ── */
.main-area {
  margin-left:var(--sidebar-w);
  flex:1;
  padding:36px 40px 80px;
  min-width:0;
  max-width:860px;
}
.area-title { font-size:22px; font-weight:900; letter-spacing:-.3px; margin-bottom:3px; }
.area-sub   { font-size:13px; color:var(--muted); margin-bottom:32px; }



/* ════════════════════════════════════
   MAIN CONTENT — Bulletin
════════════════════════════════════ */
.card {
  background:var(--card);
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.04), 0 6px 20px rgba(0,0,0,.05);
  overflow:hidden;
  margin-bottom:24px;
}
.card-head {
  padding:18px 26px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  background:var(--bg);
}
.card-title { font-size:14px; font-weight:800; color:var(--text); letter-spacing:.3px; }
.card-body  { padding:24px 26px; }

.bulletin-toolbar { display:flex; gap:8px; align-items:center; }
.btn-add-item {
  padding:8px 16px; border-radius:9px;
  background:var(--gold-light); color:var(--gold);
  border:1.5px solid var(--gold-border);
  font-size:13px; font-weight:700; font-family:inherit;
  cursor:pointer; transition:all .15s;
}
.btn-add-item:hover { background:#e0e7ff; }
.btn-publish {
  padding:8px 18px; border-radius:9px;
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  color:white; border:none;
  font-size:13px; font-weight:700; font-family:inherit;
  cursor:pointer; transition:all .2s;
  box-shadow:0 3px 12px rgba(22,163,74,.28);
  display:inline-flex; align-items:center; gap:6px;
}
.btn-publish:hover { filter:brightness(1.08); transform:translateY(-1px); }
.btn-publish:disabled { background:var(--muted); box-shadow:none; cursor:not-allowed; transform:none; }

/* Item rows */
.b-list { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
.b-row {
  display:grid;
  grid-template-columns:140px 1fr auto auto;
  gap:10px; align-items:center;
  background:var(--bg);
  border-radius:11px; padding:11px 14px;
  border:1.5px solid var(--border);
  transition:border-color .15s, box-shadow .15s;
}
.b-row:hover { border-color:var(--gold-border); box-shadow:0 2px 8px rgba(79,70,229,.06); }
.b-inp {
  width:100%; padding:8px 11px;
  border:1.5px solid var(--border); border-radius:8px;
  font-size:13px; font-family:inherit; outline:none;
  background:var(--card); transition:border-color .15s;
  color:var(--text);
}
.b-inp:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(79,70,229,.08); }
.b-check {
  display:flex; align-items:center; gap:7px;
  font-size:12px; font-weight:600; color:var(--muted);
  cursor:pointer; white-space:nowrap; user-select:none;
}
.b-check input[type="checkbox"] {
  width:15px; height:15px; cursor:pointer; accent-color:var(--gold);
}
.b-del {
  width:30px; height:30px; border-radius:8px;
  background:#fee2e2; color:var(--red);
  border:none; font-size:17px; font-weight:400;
  cursor:pointer; transition:background .15s;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; line-height:1;
}
.b-del:hover { background:#fecaca; }

.b-empty {
  padding:28px; text-align:center;
  color:var(--muted); font-size:13px;
  background:var(--bg); border-radius:10px;
  border:1.5px dashed var(--border);
  margin-bottom:20px;
}

.save-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding-top:16px; border-top:1px solid var(--border);
}
.save-status { font-size:12px; color:var(--muted); }
.save-status.ok  { color:var(--green); font-weight:700; }
.save-status.err { color:var(--red); font-weight:600; }
.save-bin { font-size:11px; color:var(--muted); font-family:monospace; }

/* ── Preview ── */
.preview-shell {
  background:var(--card);
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.04), 0 6px 20px rgba(0,0,0,.05);
  overflow:hidden;
}
.preview-top {
  background:linear-gradient(135deg,#0F172A 0%,#1E293B 50%,#263348 100%);
  padding:18px 26px;
  display:flex; align-items:center; gap:12px;
}
.pt-pin { font-size:16px; }
.pt-zh  { font-size:15px; font-weight:900; color:white; letter-spacing:4px; }
.pt-en  { font-size:10px; color:rgba(255,255,255,.4); letter-spacing:2px; margin-left:auto; }
.preview-body { padding:4px 26px 20px; }
.pv-item {
  display:flex; align-items:baseline; gap:12px;
  padding:13px 0; border-bottom:1px solid var(--border);
}
.pv-item:last-child { border-bottom:none; }
.pv-date  { font-size:12px; color:var(--muted); white-space:nowrap; letter-spacing:.5px; min-width:72px; }
.pv-badge {
  background:var(--gold); color:white;
  font-size:10px; font-weight:700; padding:2px 9px;
  border-radius:100px; white-space:nowrap; flex-shrink:0; letter-spacing:.5px;
}
.pv-text  { font-size:14px; color:var(--text); line-height:1.65; }
.pv-empty { padding:24px 26px; font-size:13px; color:var(--muted); text-align:center; }

/* ── Cloud status pill (topbar) ── */
.tb-cloud {
  display:flex; align-items:center; gap:7px;
  padding:6px 14px; border-radius:100px;
  border:1.5px solid var(--border);
  font-size:12px; font-weight:600;
  color:var(--muted); background:var(--bg);
  text-decoration:none; transition:all .18s; cursor:pointer;
  white-space:nowrap;
}
.tb-cloud:hover { filter:brightness(.95); }
.tb-cloud.ok  { border-color:#bbf7d0; color:var(--green); background:var(--green-bg); }
.tb-cloud.err { border-color:#fecaca; color:var(--red);   background:#fff5f5; }
.tb-cloud-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--muted); flex-shrink:0;
}
.tb-cloud.ok  .tb-cloud-dot { background:var(--green); box-shadow:0 0 0 3px rgba(22,163,74,.20); }
.tb-cloud.err .tb-cloud-dot { background:var(--red);   box-shadow:0 0 0 3px rgba(220,38,38,.20); }

/* ── Cloud disconnected banner ── */
.cloud-warn {
  display:none; align-items:center; gap:14px;
  background:#fff5f5; border:1.5px solid #fecaca;
  border-radius:12px; padding:14px 20px;
  font-size:13px; color:#b91c1c; line-height:1.6;
  margin-bottom:20px;
}
.cloud-warn.show { display:flex; }
.cloud-warn span { flex:1; }
.cloud-warn a { color:#b91c1c; font-weight:700; text-decoration:none; white-space:nowrap; border-bottom:1px solid #fca5a5; }
.cloud-warn a:hover { border-bottom-color:#b91c1c; }
</style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="7" y="16" width="24" height="17" rx="3.5" fill="white" fill-opacity=".92"/>
        <path d="M13 16v-5a6 6 0 0 1 12 0v5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="19" cy="24.5" r="2.8" fill="#A5B4FC"/>
        <rect x="17.6" y="24.5" width="2.8" height="4.5" rx="1.4" fill="#A5B4FC"/>
      </svg>
    </div>
    <div class="lc-brand">翔 躍 企 業 社</div>
    <div class="lc-sub">Admin · Back Office</div>
    <input class="lc-input" type="email" id="emailInput" placeholder="管理員帳號" style="letter-spacing:0;margin-bottom:10px;"
      onkeydown="if(event.key==='Enter')document.getElementById('pwInput').focus()">
    <input class="lc-input" type="password" id="pwInput" placeholder="• • • • • • • •"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lc-btn" onclick="doLogin()">進入後台</button>
    <div class="lc-err" id="loginError"></div>
  </div>
</div>

<!-- ══════════════ ADMIN SHELL ══════════════ -->
<div id="adminShell">

  <!-- Topbar -->
  <div class="topbar">
    <span class="tb-brand">後台管理</span>
    <div class="tb-sep"></div>
    <a class="tb-cloud" id="tbCloud" href="後台管理-進階設定.html">
      <span class="tb-cloud-dot"></span>
      <span id="tbCloudText">檢查中…</span>
    </a>
    <button class="tb-logout" onclick="doLogout()">登出</button>
  </div>

  <div class="admin-body">

    <!-- ── Left Sidebar ── -->
    <nav class="sidebar">
      <div class="sb-section-label">內容管理</div>
      <a class="sb-item active" href="#" onclick="scrollTo(0,0);return false;">
        <svg class="sb-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2 5a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2V5zM2 13a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2v-2z"/></svg>
        布告欄管理
      </a>
      <a class="sb-item" href="後台管理-出貨管理.html">
        <svg class="sb-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 2a4 4 0 00-4 4v1H5a1 1 0 00-.994.89l-1 9A1 1 0 004 18h12a1 1 0 00.994-1.11l-1-9A1 1 0 0015 7h-1V6a4 4 0 00-4-4zm2 5V6a2 2 0 10-4 0v1h4zm-6 3a1 1 0 112 0 1 1 0 01-2 0zm7-1a1 1 0 100 2 1 1 0 000-2z" clip-rule="evenodd"/></svg>
        出貨管理
      </a>
      <a class="sb-item" href="後台管理-商品管理.html">
        <svg class="sb-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M4 3a2 2 0 100 4h12a2 2 0 100-4H4zM3 8h14v7a2 2 0 01-2 2H5a2 2 0 01-2-2V8zm5 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/></svg>
        商品管理
      </a>
      <div class="sb-divider"></div>
      <a class="sb-item" href="後台管理-進階設定.html">
        <svg class="sb-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
        進階設定
      </a>
      <div class="sb-divider"></div>
    </nav>

    <!-- ── Main ── -->
    <main class="main-area">
      <div class="area-title">布告欄管理</div>
      <div class="area-sub">新增、編輯首頁公告，儲存後即時更新至官網</div>

      <div class="cloud-warn" id="cloudWarn">
        <span>雲端尚未連結，儲存功能已停用。請完成 API Key 設定以啟用雲端同步。</span>
        <a href="後台管理-進階設定.html">前往設定 →</a>
      </div>

      <!-- 管理卡片 -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">公告列表</span>
          <div class="bulletin-toolbar">
            <button class="btn-add-item" onclick="addItem()">＋ 新增公告</button>
            <button class="btn-publish" id="saveBtn" onclick="saveToJSONBin()">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><polyline points="1.5,6.5 5.5,10.5 11.5,2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              儲存並上線
            </button>
          </div>
        </div>
        <div class="card-body">
          <div class="b-list" id="itemList"></div>
          <div class="save-bar">
            <span class="save-status" id="saveStatus"></span>
          </div>
        </div>
      </div>

      <!-- 即時預覽 -->
      <div class="preview-shell">
        <div class="preview-top">
          <span class="pt-pin">📌</span>
          <span class="pt-zh">最 新 公 告</span>
          <span class="pt-en">NOTICE BOARD</span>
        </div>
        <div class="preview-body" id="previewBody"></div>
      </div>

    </main>

  </div>
</div>

<script>
// ── Firebase 初始化 ───────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDOl7Kq_mZZPdCPkSb_oRPBlxh37sZG5ls",
  authDomain: "xiangyue-order.firebaseapp.com",
  projectId: "xiangyue-order",
  storageBucket: "xiangyue-order.firebasestorage.app",
  messagingSenderId: "89673554795",
  appId: "1:89673554795:web:e101e39be2d99349a84a2e"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ── Login ─────────────────────────────────────────────
function doLogin() {
  var email = document.getElementById('emailInput').value.trim();
  var pw = document.getElementById('pwInput').value;
  if (!email || !pw) {
    document.getElementById('loginError').textContent = '請輸入帳號與密碼';
    return;
  }
  document.getElementById('loginError').textContent = '登入中...';
  auth.signInWithEmailAndPassword(email, pw)
    .then(() => {})
    .catch(err => {
      var msg = '登入失敗';
      if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') msg = '帳號或密碼錯誤';
      else if (err.code === 'auth/invalid-email') msg = '電子郵件格式不正確';
      else if (err.code === 'auth/too-many-requests') msg = '嘗試次數過多，請稍後再試';
      document.getElementById('loginError').textContent = msg;
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    });
}
function doLogout() {
  auth.signOut().then(() => location.reload());
}
function show() {
  document.getElementById('loginScreen').style.display = 'none';
  var s = document.getElementById('adminShell');
  s.style.display = 'flex';
  s.style.flexDirection = 'column';
  initAdmin();
}

// 監聽登入狀態
auth.onAuthStateChanged(user => {
  if (user) {
    show();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminShell').style.display = 'none';
  }
});

// ── Data ──────────────────────────────────────────────
var items = [];

function initAdmin() {
  renderCloudStatus();
  var binId = localStorage.getItem('xy_binId') || '69e29121856a682189461f2a';
  loadBin(binId);
}

function renderCloudStatus() {
  var key   = localStorage.getItem('xy_masterKey') || '';
  var binId = localStorage.getItem('xy_binId')    || '';
  var pill  = document.getElementById('tbCloud');
  var text  = document.getElementById('tbCloudText');
  var warn  = document.getElementById('cloudWarn');
  var btn   = document.getElementById('saveBtn');
  if (key && binId) {
    pill.className = 'tb-cloud ok';
    text.textContent = '雲端連線中';
    warn.classList.remove('show');
    btn.disabled = false;
  } else {
    pill.className = 'tb-cloud err';
    text.textContent = '未連結雲端';
    warn.classList.add('show');
    btn.disabled = true;
  }
}


function loadBin(binId) {
  if (!binId) { render(); return; }
  // 先從快取立即顯示
  var cached = localStorage.getItem('xy_bulletinCache');
  if (cached) { try { items = JSON.parse(cached); render(); } catch(e) {} }
  // 背景向 JSONBin 拉最新資料
  fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest')
    .then(r => r.json())
    .then(d => {
      items = Array.isArray(d.record) ? d.record : [];
      localStorage.setItem('xy_bulletinCache', JSON.stringify(items));
      render();
    })
    .catch(() => { if (!cached) { items = []; render(); } });
}

// ── Render ────────────────────────────────────────────
function render() {
  var list = document.getElementById('itemList');
  if (items.length === 0) {
    list.innerHTML = '<div class="b-empty">尚無公告，點右上「＋ 新增公告」開始建立</div>';
  } else {
    list.innerHTML = items.map((item, i) =>
      `<div class="b-row">
        <input class="b-inp" type="date" value="${item.date||''}" onchange="upd(${i},'date',this.value)">
        <input class="b-inp" type="text" value="${esc(item.text||'')}" placeholder="公告內容" oninput="upd(${i},'text',this.value)">
        <label class="b-check"><input type="checkbox"${item.isNew?' checked':''} onchange="upd(${i},'isNew',this.checked)"> 最新</label>
        <button class="b-del" onclick="del(${i})" title="刪除">×</button>
      </div>`
    ).join('');
  }
  renderPreview();
}

function renderPreview() {
  var body = document.getElementById('previewBody');
  if (!items.length) { body.innerHTML = '<div class="pv-empty">尚無公告內容</div>'; return; }
  body.innerHTML = items.map(item => {
    var d = item.date ? item.date.replace(/-/g,'.') : '';
    return `<div class="pv-item">
      <span class="pv-date">${d}</span>
      ${item.isNew ? '<span class="pv-badge">最新</span>' : ''}
      <span class="pv-text">${esc(item.text||'')}</span>
    </div>`;
  }).join('');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ── Actions ───────────────────────────────────────────
function addItem() {
  items.unshift({ date: new Date().toISOString().slice(0,10), text:'', isNew:true });
  render();
}
function del(i) { items.splice(i,1); render(); }
function upd(i, f, v) { items[i][f]=v; renderPreview(); }

// ── Save ──────────────────────────────────────────────
function saveToJSONBin() {
  var key   = localStorage.getItem('xy_masterKey') || '';
  var binId = localStorage.getItem('xy_binId') || '';
  var btn   = document.getElementById('saveBtn');
  if (!key || !binId) { renderCloudStatus(); return; }
  btn.disabled = true;
  setSta('上傳中…','');
  fetch('https://api.jsonbin.io/v3/b/' + binId, {
    method:'PUT',
    headers:{ 'Content-Type':'application/json','X-Master-Key':key },
    body: JSON.stringify(items)
  })
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(() => {
    setSta('✓ 發布成功，官網已更新！','ok');
    localStorage.setItem('xy_bulletinCache', JSON.stringify(items));
  })
  .catch(e => setSta('發布失敗：' + e.message,'err'))
  .finally(() => { btn.disabled = false; });
}

function setSta(msg, cls) {
  var el = document.getElementById('saveStatus');
  el.textContent = msg;
  el.className = 'save-status' + (cls ? ' '+cls : '');
}
</script>
</body>
