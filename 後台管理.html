<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後台管理 · 翔躍企業社</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── 全域 ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brown:   #B55A2A;
            --brown-d: #8C3F16;
            --brown-l: #f5ece4;
            --ink:     #2a1f14;
            --muted:   #7a6a5a;
            --border:  #ddd0c4;
            --bg:      #faf7f4;
            --white:   #ffffff;
            --red:     #c0392b;
            --green:   #27ae60;
            --radius:  10px;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── 登入畫面 ── */
        #loginScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #2a1f14 0%, #5c3a1e 100%);
        }

        .login-card {
            background: var(--white);
            border-radius: 16px;
            padding: 48px 40px 40px;
            width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,.35);
            text-align: center;
        }

        .login-logo {
            font-size: 13px;
            letter-spacing: .18em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--brown);
            letter-spacing: .06em;
            margin-bottom: 30px;
        }

        .login-card label {
            display: block;
            text-align: left;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: .08em;
            margin-bottom: 6px;
        }

        .login-card input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: inherit;
            color: var(--ink);
            outline: none;
            transition: border-color .2s;
            margin-bottom: 18px;
        }

        .login-card input[type="password"]:focus {
            border-color: var(--brown);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--brown);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-family: inherit;
            font-weight: 500;
            letter-spacing: .1em;
            cursor: pointer;
            transition: background .2s;
        }

        .btn-login:hover { background: var(--brown-d); }

        .login-error {
            margin-top: 14px;
            font-size: 13px;
            color: var(--red);
            display: none;
        }

        /* ── 後台主頁面 ── */
        #adminScreen { display: none; }

        .admin-header {
            background: linear-gradient(90deg, #2a1f14, #5c3a1e);
            color: #fff;
            padding: 0 32px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,.3);
        }

        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .admin-header-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: .12em;
        }

        .admin-header-sub {
            font-size: 11px;
            color: rgba(255,255,255,.55);
            letter-spacing: .08em;
        }

        .btn-logout {
            background: rgba(255,255,255,.12);
            color: #fff;
            border: 1px solid rgba(255,255,255,.25);
            border-radius: 6px;
            padding: 6px 16px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: .06em;
            transition: background .2s;
        }

        .btn-logout:hover { background: rgba(255,255,255,.22); }

        .admin-body {
            max-width: 860px;
            margin: 40px auto;
            padding: 0 20px 60px;
        }

        /* ── 區塊卡片 ── */
        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px 28px 24px;
            margin-bottom: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,.05);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--brown);
            letter-spacing: .06em;
        }

        .card-hint {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: .04em;
        }

        /* ── 公告項目 ── */
        .bulletin-items { display: flex; flex-direction: column; gap: 14px; }

        .bulletin-row {
            display: grid;
            grid-template-columns: 152px 1fr 90px 36px;
            gap: 10px;
            align-items: start;
            background: var(--brown-l);
            border: 1px solid #e8d8cc;
            border-radius: 10px;
            padding: 14px 14px 12px;
            transition: box-shadow .2s;
        }

        .bulletin-row:hover { box-shadow: 0 2px 10px rgba(181,90,42,.12); }

        .row-label {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: .06em;
            margin-bottom: 5px;
            display: block;
        }

        .row-field { display: flex; flex-direction: column; }

        .bulletin-row input[type="date"],
        .bulletin-row input[type="text"],
        .bulletin-row textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            font-family: inherit;
            font-size: 13.5px;
            color: var(--ink);
            background: var(--white);
            outline: none;
            transition: border-color .2s;
            resize: none;
        }

        .bulletin-row input:focus,
        .bulletin-row textarea:focus { border-color: var(--brown); }

        .bulletin-row textarea { min-height: 52px; line-height: 1.5; }

        .row-badge-wrap { display: flex; flex-direction: column; gap: 6px; }

        .badge-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 12px;
            color: var(--ink);
            user-select: none;
        }

        .badge-toggle input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: var(--brown);
            cursor: pointer;
        }

        .btn-delete {
            background: none;
            border: 1.5px solid #e0bbb0;
            color: #c0775a;
            border-radius: 7px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all .2s;
            flex-shrink: 0;
        }

        .btn-delete:hover { background: #fde8e0; border-color: var(--red); color: var(--red); }

        /* ── 新增 / 操作按鈕 ── */
        .actions-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13.5px;
            font-weight: 500;
            letter-spacing: .06em;
            cursor: pointer;
            border: none;
            transition: all .18s;
        }

        .btn-primary { background: var(--brown); color: #fff; }
        .btn-primary:hover { background: var(--brown-d); }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--brown);
            color: var(--brown);
        }
        .btn-outline:hover { background: var(--brown-l); }

        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { filter: brightness(1.1); }

        /* ── 預覽區 ── */
        .preview-board {
            background: linear-gradient(135deg, #2a1f14 0%, #5c3a1e 100%);
            border-radius: 12px;
            padding: 24px 22px 20px;
            color: #e8d8cc;
        }

        .preview-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,.12);
        }

        .preview-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: .2em;
        }

        .preview-en {
            font-size: 10px;
            color: rgba(255,255,255,.45);
            letter-spacing: .14em;
        }

        .preview-list { list-style: none; }

        .preview-item {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid rgba(255,255,255,.07);
            font-size: 13px;
        }

        .preview-item:last-child { border-bottom: none; }

        .preview-date { color: rgba(255,255,255,.55); font-size: 11.5px; white-space: nowrap; }

        .preview-badge {
            font-size: 10px;
            background: var(--brown);
            color: #fff;
            padding: 1px 7px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* ── 密碼變更 ── */
        .pw-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 16px;
        }

        .pw-grid label {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: .06em;
            display: block;
            margin-bottom: 5px;
        }

        .pw-grid input {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
        }

        .pw-grid input:focus { border-color: var(--brown); }

        .pw-msg { font-size: 12.5px; margin-top: 10px; min-height: 18px; }

        /* ── 提示訊息 ── */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #2a1f14;
            color: #fff;
            padding: 12px 22px;
            border-radius: 10px;
            font-size: 13.5px;
            letter-spacing: .06em;
            box-shadow: 0 6px 24px rgba(0,0,0,.3);
            transform: translateY(20px);
            opacity: 0;
            transition: all .3s;
            pointer-events: none;
            z-index: 999;
        }

        .toast.show { transform: translateY(0); opacity: 1; }

        @media (max-width: 640px) {
            .bulletin-row {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto auto;
            }
            .bulletin-row > .row-field:first-child { grid-column: 1; }
            .bulletin-row > .row-field:nth-child(2) { grid-column: 1 / -1; }
            .pw-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ══════════════ 登入畫面 ══════════════ -->
<div id="loginScreen">
    <div class="login-card">
        <div class="login-logo">翔躍企業社 · XIANG YUE</div>
        <div class="login-title">後 台 管 理</div>
        <label for="pwInput">管 理 員 密 碼</label>
        <input type="password" id="pwInput" placeholder="請輸入密碼" autocomplete="current-password">
        <button class="btn-login" onclick="doLogin()">登 入</button>
        <div class="login-error" id="loginError">密碼錯誤，請重新輸入</div>
    </div>
</div>

<!-- ══════════════ 後台主頁面 ══════════════ -->
<div id="adminScreen">

    <header class="admin-header">
        <div class="admin-header-left">
            <div>
                <div class="admin-header-title">翔躍企業社 · 後台管理</div>
                <div class="admin-header-sub">XIANG YUE ENTERPRISE · ADMIN</div>
            </div>
        </div>
        <button class="btn-logout" onclick="doLogout()">登 出</button>
    </header>

    <main class="admin-body">

        <!-- ── 布告欄管理 ── -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">📌 布告欄管理</span>
                <span class="card-hint">修改後點擊「儲存並套用」即即時生效於首頁</span>
            </div>

            <div class="bulletin-items" id="bulletinItems">
                <!-- 由 JS 動態生成 -->
            </div>

            <div class="actions-row">
                <button class="btn btn-outline" onclick="addRow()">＋ 新增一筆公告</button>
                <button class="btn btn-success" onclick="saveAll()">✓ 儲存並套用</button>
            </div>
        </div>

        <!-- ── 即時預覽 ── -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">👁 即時預覽</span>
                <span class="card-hint">儲存後首頁布告欄將顯示如下</span>
            </div>
            <div class="preview-board">
                <div class="preview-header">
                    <span>📌</span>
                    <span class="preview-title">最 新 公 告</span>
                    <span class="preview-en">NOTICE BOARD</span>
                </div>
                <ul class="preview-list" id="previewList"></ul>
            </div>
        </div>

        <!-- ── 更改密碼 ── -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">🔒 更改管理密碼</span>
            </div>
            <div class="pw-grid">
                <div>
                    <label>舊密碼</label>
                    <input type="password" id="pwOld" placeholder="請輸入舊密碼">
                </div>
                <div>
                    <label>新密碼</label>
                    <input type="password" id="pwNew" placeholder="請輸入新密碼">
                </div>
            </div>
            <button class="btn btn-primary" onclick="changePassword()">更 新 密 碼</button>
            <div class="pw-msg" id="pwMsg"></div>
        </div>

    </main>
</div>

<!-- ── Toast 提示 ── -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   設定區：預設密碼（首次使用可在此修改）
   ══════════════════════════════════════ */
var DEFAULT_PASSWORD = 'admin1234';   // ← 在此修改預設密碼

/* ══════════════════════════════════════
   儲存鍵名
   ══════════════════════════════════════ */
var KEY_PW       = 'xyAdmin_pw';
var KEY_BULLETIN = 'xyAdmin_bulletin';
var KEY_SESSION  = 'xyAdmin_session';

/* ══════════════════════════════════════
   預設公告資料（首次載入 / localStorage 為空時）
   ══════════════════════════════════════ */
var DEFAULT_ITEMS = [
    { date: '2026-04-16', text: '123',  isNew: true  },
    { date: '2026-04-10', text: '123',  isNew: false },
    { date: '2026-03-28', text: '123',  isNew: false },
    { date: '2026-03-15', text: '工123', isNew: false },
    { date: '2026-02-20', text: '123',  isNew: false }
];

/* ══════════════════════════════════════
   工具函式
   ══════════════════════════════════════ */
function getPassword(){
    return localStorage.getItem(KEY_PW) || DEFAULT_PASSWORD;
}

function getBulletin(){
    var raw = localStorage.getItem(KEY_BULLETIN);
    if(raw){ try{ return JSON.parse(raw); }catch(e){} }
    return DEFAULT_ITEMS.map(function(i){ return Object.assign({}, i); });
}

function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

/* ══════════════════════════════════════
   登入 / 登出
   ══════════════════════════════════════ */
function doLogin(){
    var val = document.getElementById('pwInput').value;
    if(val === getPassword()){
        sessionStorage.setItem(KEY_SESSION, '1');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'block';
        renderRows();
        renderPreview();
    } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('pwInput').value = '';
    }
}

document.getElementById('pwInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') doLogin();
});

function doLogout(){
    sessionStorage.removeItem(KEY_SESSION);
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('pwInput').value = '';
    document.getElementById('loginError').style.display = 'none';
}

/* 頁面載入：若 session 仍在，直接進後台 */
window.addEventListener('DOMContentLoaded', function(){
    if(sessionStorage.getItem(KEY_SESSION)){
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'block';
        renderRows();
        renderPreview();
    }
});

/* ══════════════════════════════════════
   公告列表渲染
   ══════════════════════════════════════ */
function renderRows(){
    var items = getBulletin();
    var wrap  = document.getElementById('bulletinItems');
    wrap.innerHTML = '';
    items.forEach(function(item, idx){
        wrap.appendChild(buildRow(item, idx));
    });
}

function buildRow(item, idx){
    var row = document.createElement('div');
    row.className = 'bulletin-row';
    row.dataset.idx = idx;

    row.innerHTML =
        '<div class="row-field">' +
            '<span class="row-label">日 期</span>' +
            '<input type="date" class="f-date" value="' + escHtml(item.date) + '" oninput="livePreview()">' +
        '</div>' +
        '<div class="row-field">' +
            '<span class="row-label">公 告 內 容</span>' +
            '<textarea class="f-text" rows="2" oninput="livePreview()">' + escHtml(item.text) + '</textarea>' +
        '</div>' +
        '<div class="row-field row-badge-wrap">' +
            '<span class="row-label">標 籤</span>' +
            '<label class="badge-toggle">' +
                '<input type="checkbox" class="f-new"' + (item.isNew ? ' checked' : '') + ' onchange="livePreview()"> 顯示「最新」' +
            '</label>' +
        '</div>' +
        '<button class="btn-delete" onclick="deleteRow(this)" title="刪除此筆">✕</button>';

    return row;
}

function deleteRow(btn){
    btn.closest('.bulletin-row').remove();
    livePreview();
}

function addRow(){
    var today = new Date();
    var y = today.getFullYear();
    var m = String(today.getMonth()+1).padStart(2,'0');
    var d = String(today.getDate()).padStart(2,'0');
    var item = { date: y+'-'+m+'-'+d, text: '', isNew: false };
    var wrap = document.getElementById('bulletinItems');
    var idx  = wrap.children.length;
    wrap.appendChild(buildRow(item, idx));
    livePreview();
}

function collectRows(){
    var rows  = document.querySelectorAll('.bulletin-row');
    var items = [];
    rows.forEach(function(row){
        var date  = row.querySelector('.f-date').value;
        var text  = row.querySelector('.f-text').value.trim();
        var isNew = row.querySelector('.f-new').checked;
        items.push({ date: date, text: text, isNew: isNew });
    });
    return items;
}

function saveAll(){
    var items = collectRows();
    localStorage.setItem(KEY_BULLETIN, JSON.stringify(items));
    renderPreview();
    showToast('✓ 已儲存！首頁布告欄已即時更新');
}

/* ══════════════════════════════════════
   即時預覽
   ══════════════════════════════════════ */
function livePreview(){
    var items = collectRows();
    renderPreviewWith(items);
}

function renderPreview(){
    renderPreviewWith(getBulletin());
}

function renderPreviewWith(items){
    var list = document.getElementById('previewList');
    list.innerHTML = '';
    items.forEach(function(item){
        if(!item.text) return;
        var li = document.createElement('li');
        li.className = 'preview-item';
        var disp = item.date ? item.date.replace(/-/g,'.') : '';
        li.innerHTML =
            '<span class="preview-date">' + escHtml(disp) + '</span>' +
            (item.isNew ? '<span class="preview-badge">最新</span>' : '') +
            '<span>' + escHtml(item.text) + '</span>';
        list.appendChild(li);
    });
}

/* ══════════════════════════════════════
   更改密碼
   ══════════════════════════════════════ */
function changePassword(){
    var oldPw  = document.getElementById('pwOld').value;
    var newPw  = document.getElementById('pwNew').value;
    var msgEl  = document.getElementById('pwMsg');

    if(oldPw !== getPassword()){
        msgEl.style.color = '#c0392b';
        msgEl.textContent = '舊密碼輸入錯誤';
        return;
    }
    if(newPw.length < 4){
        msgEl.style.color = '#c0392b';
        msgEl.textContent = '新密碼請至少 4 個字元';
        return;
    }
    localStorage.setItem(KEY_PW, newPw);
    document.getElementById('pwOld').value = '';
    document.getElementById('pwNew').value = '';
    msgEl.style.color = '#27ae60';
    msgEl.textContent = '密碼已成功更新';
    showToast('✓ 密碼已更新');
    setTimeout(function(){ msgEl.textContent = ''; }, 3000);
}

/* ══════════════════════════════════════
   XSS 防護：字串轉義
   ══════════════════════════════════════ */
function escHtml(str){
    return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}
</script>
</body>
</html>
